<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="72" y1="56" x2="440" y2="456" gradientUnits="userSpaceOnUse">
            <stop stop-color="#4F8CFF"/>
            <stop offset="1" stop-color="#7B5CFF"/>
        </linearGradient>

        <linearGradient id="frame" x1="176" y1="180" x2="336" y2="332" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#DCE6FF"/>
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.22"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect x="40" y="40" width="432" height="432" rx="96" fill="url(#bg)"/>

    <!-- Eye -->
    <g filter="url(#shadow)">
        <path
            d="M96 256C132 180 188 140 256 140C324 140 380 180 416 256C380 332 324 372 256 372C188 372 132 332 96 256Z"
            fill="rgba(255,255,255,0.06)"
            stroke="white"
            stroke-width="18"
            stroke-linejoin="round"
            />

        <!-- Iris -->
        <circle cx="256" cy="256" r="78" fill="#1B1D38"/>

        <!-- Call stack visualization -->
        <g>
            <!-- Connector lines -->
            <path d="M220 220H244" stroke="#AFC7FF" stroke-width="8" stroke-linecap="round"/>
            <path d="M236 256H260" stroke="#AFC7FF" stroke-width="8" stroke-linecap="round"/>
            <path d="M252 292H276" stroke="#AFC7FF" stroke-width="8" stroke-linecap="round"/>

            <!-- Stack frames -->
            <rect x="244" y="202" width="56" height="36" rx="10" fill="url(#frame)"/>
            <rect x="260" y="238" width="56" height="36" rx="10" fill="url(#frame)"/>
            <rect x="276" y="274" width="56" height="36" rx="10" fill="url(#frame)"/>

            <!-- Frame labels -->
            <rect x="256" y="214" width="20" height="4" rx="2" fill="#5B6BFF"/>
            <rect x="256" y="222" width="32" height="4" rx="2" fill="#5B6BFF" opacity="0.7"/>

            <rect x="272" y="250" width="20" height="4" rx="2" fill="#5B6BFF"/>
            <rect x="272" y="258" width="32" height="4" rx="2" fill="#5B6BFF" opacity="0.7"/>

            <rect x="288" y="286" width="20" height="4" rx="2" fill="#5B6BFF"/>
            <rect x="288" y="294" width="32" height="4" rx="2" fill="#5B6BFF" opacity="0.7"/>
        </g>

        <!-- Outer focus ring -->
        <circle
            cx="256"
            cy="256"
            r="108"
            stroke="white"
            stroke-opacity="0.16"
            stroke-width="10"
            stroke-dasharray="12 16"
            />
        </g>
    </svg>
